<div class="container-scroller">
    <div class="container-fluid page-body-wrapper full-page-wrapper">
        <div class="content-wrapper d-flex align-items-center auth">
            <div class="row flex-grow">
                <div class="col-lg-4 mx-auto">
                    <div class="auth-form-light text-left p-5">
                        <h4>Hello! let's get started</h4>
                        <h6 class="font-weight-light">Sign in to continue.</h6>

                        <div class="alert alert-danger" role="alert"
                            *ngIf="errorModel!=null && errorModel.Unauthorized!=null">
                            {{errorModel.Unauthorized}}</div>

                        <div class="form-group">
                            <input type="email" class="form-control form-control-lg" [(ngModel)]="loginModel.Username"
                                placeholder="Username">
                            <div class="alert alert-danger mt-1" role="alert"
                                *ngIf="errorModel!=null && errorModel.Username!=null">
                                {{errorModel.Username}}</div>
                                <div class="alert alert-danger mt-1" role="alert"
                                *ngIf="errorModel!=null && errorModel.UserNotFound!=null">
                                {{errorModel.UserNotFound}}</div>
                        </div>
                        <div class="form-group">
                            <input type="password" class="form-control form-control-lg"
                                [(ngModel)]="loginModel.Password" placeholder="Password">
                            <div class="alert alert-danger mt-1" role="alert"
                                *ngIf="errorModel!=null && errorModel.Password!=null">
                                {{errorModel.Password}}</div>
                                 <div class="alert alert-danger mt-1" role="alert"
                                *ngIf="errorModel!=null && errorModel.InvalidPassword!=null">
                                {{errorModel.InvalidPassword}}</div>
                        </div>
                        <div class="mt-3">
                            <a (click)="login(loginModel)"
                                class="btn d-grid btn-primary btn-lg font-weight-medium auth-form-btn">SIGN IN</a>
                        </div>
                        <div class="text-center mt-4 font-weight-light"> Don't have an account? <a
                                routerLink="/register" class="text-primary">Create</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- content-wrapper ends -->
    </div>
    <!-- page-body-wrapper ends -->
</div>
