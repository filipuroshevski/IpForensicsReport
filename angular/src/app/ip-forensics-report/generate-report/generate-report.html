<div class="container-scroller">
    <div class="container-fluid page-body-wrapper full-page-wrapper">
        <div class="content-wrapper d-flex align-items-center auth">
            <div class="row flex-grow">

                <div class="col-lg-4 mx-auto">
                    <div class="">
                        <a type="button" class="mt-2 float-right mr-2 btn btn-primary position-relative "
                            routerLink="/reports/list">My Reports
                        </a>
                         <a type="button" class="mt-2 float-right mr-2 btn btn-primary position-relative "
                            routerLink="/dashboard">Dashboard
                        </a>
                    </div>
                    <div class="auth-form-light text-left p-5">
                        <h4>Ip Forensics Report</h4>
                        <h6 class="font-weight-light">Enter IP Address to generate report.</h6>

                        <div class="form-group">
                            <input type="text" class="form-control form-control-lg" placeholder="IP Address"
                                [(ngModel)]="generateReportModel.IpAddress">
                            <div class="alert alert-danger mt-1" role="alert"
                                *ngIf="errorModel!=null && errorModel.IpAddress!=null">
                                {{errorModel.IpAddress}}</div>
                                <div class="alert alert-danger mt-1" role="alert"
                                *ngIf="errorModel!=null && errorModel.IpAddressInvalid!=null">
                                {{errorModel.IpAddressInvalid}}</div>
                        </div>

                        <div class="mt-3">
                            <a class="btn d-grid btn-primary btn-lg font-weight-medium auth-form-btn"
                                (click)="generateReport(generateReportModel)">Generate</a>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
