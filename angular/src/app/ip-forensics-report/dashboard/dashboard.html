<div class="container py-5">
  <div class="row justify-content-center g-4">

    <!-- Generate New Report -->
    <div class="col-12 col-sm-10 col-md-6 col-lg-4" routerLink="/generate-report">
      <div class="report-card report-card--blue card h-100 border-0 text-center p-4">
        <div class="card-body d-flex flex-column align-items-center justify-content-center">
          <div class="report-icon mb-4">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"
              stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z" />
              <path d="M14 3v5h5" />
              <line x1="12" y1="11.5" x2="12" y2="17.5" />

      </div>
    </div>

    <!-- My Reports -->
    <div class="col-12 col-sm-10 col-md-6 col-lg-4 ml-2" routerLink="/reports/list">

          <div class="report-icon mb-4">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"

              <line x1="10.5" y1="9" x2="15.5" y2="9" />
              <line x1="10.5" y1="12.5" x2="15.5" y2="12.5" />
              <line x1="10.5" y1="16" x2="13.5" y2="16" />
            </svg>
          </div>
          <h6 class="report-label text-uppercase mb-0">My Reports</h6>
        </div>
      </div>
    </div>

  </div>
</div>
